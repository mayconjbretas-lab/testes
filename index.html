<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JBRETAS — Painel de Coletas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:#161b22;border-bottom:1px solid #21262d;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{color:#00e5a0;font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
.tright{display:flex;align-items:center;gap:8px}
.ldot{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:pulse 1.4s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chip-sm{background:#21262d;border-radius:5px;padding:3px 8px;font-size:11px;color:#8b949e}
.chip-sm b{color:#e6edf3}
.btn-icon{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 9px;font-size:13px;color:#c9d1d9;cursor:pointer;border:none}

/* PROGRESSO */
.prog{height:2px;background:#21262d;flex-shrink:0}
.prog-fill{height:100%;background:#00e5a0;transition:width .3s}

/* FILTROS */
.filtros{background:#161b22;border-bottom:1px solid #21262d;padding:6px 12px;display:flex;align-items:center;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.filtros-select{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:11px;padding:4px 6px;cursor:pointer}
.pill{background:#21262d;border:1px solid #30363d;border-radius:20px;padding:4px 12px;font-size:11px;color:#8b949e;white-space:nowrap;cursor:pointer;user-select:none}
.pill.active{background:#00e5a015;border-color:#00e5a050;color:#00e5a0}

/* VIEW LISTA (Agrupada por MEU POSTO) */
.lista-view{flex:1;overflow-y:auto;display:none;flex-direction:column}
.lista-view.ativo{display:flex}
.lista-item{padding:14px;border-bottom:1px solid #161b22;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:background .1s}
.lista-item:active{background:#161b22}
.li-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.li-meuposto{font-size:14px;font-weight:600;color:#e6edf3;text-transform:uppercase}
.li-sub{font-size:11px;color:#00e5a0;font-weight:500}
.li-prices{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.pc{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600}
.pc-gc{background:#0f2a0f;color:#4ade80}
.pc-et{background:#1a0f2a;color:#c084fc}
.pc-ga{background:#0f1a2a;color:#60a5fa}
.pc-s10{background:#2a1f0a;color:#fbbf24}
.pc-s500{background:#2a150a;color:#fb923c}
.sd-count{font-size:10px;color:#8b949e;background:#21262d;padding:2px 6px;border-radius:4px}

/* VIEW DETALHE (Posto -> Concorrentes via Swipe) */
.detalhe-view{flex:1;overflow:hidden;display:none;flex-direction:column}
.detalhe-view.ativo{display:flex}

.card-header{background:#161b22;border-bottom:1px solid #21262d;padding:10px 14px;flex-shrink:0}
.card-nav{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.btn-voltar{background:#21262d;border:none;border-radius:6px;padding:5px 10px;font-size:11px;color:#c9d1d9;cursor:pointer}
.card-title{font-size:16px;font-weight:600;color:#e6edf3}
.card-sub{font-size:11px;color:#8b949e;margin-top:2px}
.card-sub span{color:#00e5a0;font-weight:600}

/* ÁREA DE FOTOS SWIPE */
.fotos-wrap{flex-shrink:0;background:#0a0d12;border-bottom:1px solid #21262d;position:relative;overflow:hidden;height:180px;cursor:grab}
.fotos-track{display:flex;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.foto-slide{flex-shrink:0;width:100%;height:100%;display:flex}
.foto-half{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#111620}
.foto-half img{width:100%;height:100%;object-fit:contain}
.foto-label{position:absolute;bottom:0;left:0;right:0;background:#000000a0;padding:4px 8px;font-size:10px;font-weight:600;color:#fff}
.foto-label.conc{color:#fbbf24}
.foto-label.meu{color:#00e5a0}
.foto-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#484f58;font-size:11px}
.arr{position:absolute;top:50%;transform:translateY(-50%);background:#00000060;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;pointer-events:none;opacity:.7}
.arr-l{left:6px}
.arr-r{right:6px}

/* INDICADORES (DOTS) DO CONCORRENTE ATUAL */
.swipe-dots{display:flex;gap:6px;justify-content:center;padding:8px 0;background:#161b22;flex-shrink:0;border-bottom:1px solid #21262d}
.sdot{width:6px;height:6px;border-radius:50%;background:#30363d;transition:all 0.2s;cursor:pointer}
.sdot.on{background:#00e5a0;width:16px;border-radius:3px}

/* DADOS DO CONCORRENTE SELECIONADO */
.dados-concorrente{padding:10px 14px 4px;background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0}
.dc-nome{font-size:14px;font-weight:600;color:#e6edf3;display:flex;align-items:center;gap:6px}
.dc-band{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600}
.dc-meta{font-size:11px;color:#8b949e;margin-top:3px;display:flex;gap:10px}

/* TIME SWITCH (HOJE / ONTEM) */
.time-switch-container{background:#161b22;padding:6px 14px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:between;flex-shrink:0}
.time-switch{display:flex;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:2px;margin-left:auto}
.time-btn{background:transparent;border:none;color:#8b949e;font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer}
.time-btn.active{background:#00e5a0;color:#0d1117}

/* TABELA DE PREÇOS */
.preco-section{flex:1;overflow-y:auto}
.preco-table{width:100%;border-collapse:collapse;font-size:12px}
.preco-table th{font-size:10px;color:#8b949e;font-weight:600;text-transform:uppercase;padding:8px 14px;text-align:left;border-bottom:1px solid #21262d;background:#161b22;position:sticky;top:0}
.preco-table td{padding:10px 14px;border-bottom:1px solid #161b22;vertical-align:middle}
.tr-ok td{background:#0b1810 !important}      /* Meu preço mais barato -> Fundo Verde sutil */
.tr-alert td{background:#1a0f0f !important}   /* Meu preço mais caro -> Fundo Vermelho sutil */
.tr-eq td{background:#1a150a}
.fuel-nm{font-size:12px;color:#e6edf3;font-weight:500}
.v-c{font-size:13px;font-weight:600;color:#e6edf3}
.v-m{font-size:13px;font-weight:600;color:#e6edf3}
.diff-up{color:#f85149;font-weight:600} /* Mais caro -> Texto Vermelho */
.diff-dn{color:#00e5a0;font-weight:600} /* Mais barato -> Texto Verde */

/* ALERTA */
.alerta-bar{background:#1a080080;border-bottom:1px solid #f8514930;padding:8px 14px;font-size:11px;color:#fca5a5;line-height:1.4}

/* AÇÕES */
.acoes{background:#161b22;border-top:1px solid #21262d;padding:10px 14px;display:flex;gap:8px;flex-shrink:0}
.btn-flag{background:#1a080080;color:#f85149;border:1px solid #f8514940;border-radius:8px;padding:11px 14px;font-size:14px;cursor:pointer}
.btn-ok{background:#00e5a0;color:#0d1117;border:none;border-radius:8px;padding:11px 0;font-size:12px;font-weight:600;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:5px}

.estado-central{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#484f58}
.spinner{width:32px;height:32px;border:2px solid #21262d;border-top-color:#00e5a0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">⛽ Painel Coletas (Por Posto)</div>
  <div class="tright">
    <span class="chip-sm">Data: <b id="data-hoje">—</b></span>
    <span class="chip-sm"><b id="qtd-postos">—</b> postos</span>
  </div>
</div>
<div class="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

<!-- FILTROS -->
<div class="filtros">
  <select class="filtros-select" id="filtro-supervisor" onchange="aplicarFiltros()">
    <option value="">Todos supervisores</option>
  </select>
  <span class="pill active" id="pill-todos" onclick="filtrarStatus('todos')">Todos</span>
</div>

<!-- LISTA DE POSTOS PRÓPRIOS -->
<div class="lista-view ativo" id="lista-view">
  <div class="estado-central"><div class="spinner"></div>Agrupando bases por posto...</div>
</div>

<!-- DETALHE DO POSTO (Navegação de Concorrentes via Swipe) -->
<div class="detalhe-view" id="detalhe-view">
  <div class="card-header">
    <div class="card-nav">
      <button class="btn-voltar" onclick="voltarLista()">← Ver Todos os Postos</button>
    </div>
    <div class="card-title" id="d-meuposto-nome">—</div>
    <div class="card-sub">Gerente Responsável: <span id="d-meuposto-gerente">—</span></div>
  </div>

  <!-- CONTAINER DO SWIPE DE FOTOS -->
  <div class="fotos-wrap" id="fotos-wrap">
    <div class="fotos-track" id="fotos-track"></div>
    <div class="arr arr-l">‹</div>
    <div class="arr arr-r">›</div>
  </div>

  <!-- DOTS DOS CONCORRENTES DO POSTO -->
  <div class="swipe-dots" id="swipe-dots"></div>

  <!-- DADOS DO CONCORRENTE ATUAL NO SLIDE -->
  <div class="dados-concorrente">
    <div class="dc-nome">
      <span id="d-conc-nome">—</span>
      <span class="dc-band" id="d-conc-band">—</span>
    </div>
    <div class="dc-meta">
      <span id="d-conc-hora">🕐 —</span>
      <span id="d-conc-sup">📋 —</span>
    </div>
  </div>

  <!-- MODO ONTEM / HOJE -->
  <div class="time-switch-container">
    <span style="font-size:11px;color:#8b949e">Comparação:</span>
    <div class="time-switch">
      <button class="time-btn active" id="btn-time-hoje" onclick="setTimeMode('hoje')">Hoje</button>
      <button class="time-btn" id="btn-time-ontem" onclick="setTimeMode('ontem')">Ontem para Hoje</button>
    </div>
  </div>

  <!-- PREÇOS E AUDITORIA -->
  <div class="preco-section">
    <div class="alerta-bar" id="alerta-bar" style="display:none"></div>
    <table class="preco-table">
      <thead>
        <tr>
          <th>Combustível</th>
          <th>Concorrente</th>
          <th>Meu Preço</th>
          <th>Dif.</th>
        </tr>
      </thead>
      <tbody id="tbody-precos"></tbody>
    </table>
  </div>

  <!-- AÇÕES -->
  <div class="acoes">
    <button class="btn-flag" onclick="sinalizar Margem()">⚠</button>
    <button class="btn-ok" onclick="proximoConcorrente()">✓ Confirmar Concorrente</button>
  </div>
</div>

<script>
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbwoJ3-g48frwYtMlnpVj5EIYapInPP11OJXrkOPUzCULrbIZWMQW51xFe-Ot4cox00r/exec';
const PARAM = 'tipo=coletaRecentes&dias=1';

let postosAgrupados = {}; 
let listaChaves = [];     
let idxPostoAtivo = -1;   
let idxConcAtivo = 0;     
let timeMode = 'hoje';    
let estadosAuditoria = {}; 

// Swipe state
let startX = 0, isDragging = false, dragDelta = 0;

async function carregar(){
  try {
    const resp = await fetch(ENDPOINT+'?'+PARAM);
    const json = await resp.json();
    const regs = json.registros || json.data || json || [];
    
    processarEAgruparDados(regs);
    
    document.getElementById('data-hoje').textContent = regs.length > 0 ? (regs[0].data || regs[0].Data || '25/06/2026') : '25/06/2026';
    renderListaPostos();
  } catch(e) {
    document.getElementById('lista-view').innerHTML = '<div class="estado-central">⚠ Erro ao estruturar dados</div>';
  }
}

function processarEAgruparDados(regs){
  postosAgrupados = {};
  
  regs.forEach(r => {
    // Normalização básica de campos
    const dataPosto = r.posto || r.Posto || r['Posto (Gerente)'] || 'POSTO DESCONHECIDO';
    const gerente = r.gerente || r.Gerente || '';
    const tipo = (r.tipo || r.Tipo || '').trim().toLowerCase();
    
    // Ignorar se for o registro do preço do próprio posto isolado
    if(tipo === 'próprio' || tipo === 'proprio') return;

    const chavePosto = dataPosto.trim().toUpperCase();
    
    if(!postosAgrupados[chavePosto]){
      postosAgrupados[chavePosto] = {
        nome: dataPosto,
        gerente: gerente,
        supervisor: r.supervisor || r.Supervisor || '',
        concorrentes: []
      };
    }

    // Estrutura o concorrente interno
    postosAgrupados[chavePosto].concorrentes.push({
      nomeAlvo: r.postoAlvo || r.PostoAlvo || 'Concorrente',
      bandeira: r.bandeira || r.Bandeira || 'Branca',
      hora: r.hora || r.Hora || '--:--',
      supervisor: r.supervisor || r.Supervisor || '',
      foto: r.foto || r.Foto || '',
      precos: {
        GC: pf(r.GC || r.gc),
        ET: pf(r.ET || r.et),
        GA: pf(r.GA || r.ga),
        S10: pf(r.S10 || r.s10),
        S500: pf(r.S500 || r.s500)
      }
    });
  });

  listaChaves = Object.keys(postosAgrupados);
  document.getElementById('qtd-postos').textContent = listaChaves.length;
}

function pf(v){if(!v||v==='-')return null; const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?null:n;}

// ─── RENDER DA LISTA PRINCIPAL (SEUS POSTOS) ─────────────────────
function renderListaPostos(){
  const el = document.getElementById('lista-view');
  if(listaChaves.length === 0){ el.innerHTML = '<div class="estado-central">Nenhum posto próprio mapeado.</div>'; return; }
  
  el.innerHTML = listaChaves.map((chave, i) => {
    const p = postosAgrupados[chave];
    return `<div class="lista-item" onclick="abrirPosto(${i})">
      <div class="li-top">
        <span class="li-meuposto">${p.nome}</span>
        <span class="sd-count">${p.concorrentes.length} concorrentes</span>
      </div>
      <div class="li-sub">Gerente: ${p.gerente || 'Não Informado'} | Supervisor: ${p.supervisor}</div>
    </div>`;
  }).join('');
}

// ─── NAVEGAÇÃO DE DETALHES (DENTRO DO POSTO) ──────────────────────
function abrirPosto(i){
  idxPostoAtivo = i;
  idxConcAtivo = 0;
  document.getElementById('lista-view').classList.remove('ativo');
  document.getElementById('detalhe-view').classList.add('ativo');
  
  const p = postosAgrupados[listaChaves[idxPostoAtivo]];
  document.getElementById('d-meuposto-nome').textContent = p.nome;
  document.getElementById('d-meuposto-gerente').textContent = p.gerente || '—';
  
  montarSlidesFoto();
  renderConcorrenteSelecionado();
}

function voltarLista(){
  document.getElementById('detalhe-view').classList.remove('ativo');
  document.getElementById('lista-view').classList.add('ativo');
  renderListaPostos();
}

function montarSlidesFoto(){
  const p = postosAgrupados[listaChaves[idxPostoAtivo]];
  const track = document.getElementById('fotos-track');
  
  // Largura dinâmica baseada na quantidade de concorrentes internos
  track.style.width = `${p.concorrentes.length * 100}%`;
  
  track.innerHTML = p.concorrentes.map(c => {
    const idFoto = extrairId(c.foto);
    const imgSrc = idFoto ? `https://drive.google.com/thumbnail?id=${idFoto}&sz=w800` : null;
    
    const fotoHtml = imgSrc 
      ? `<img src="${imgSrc}" alt="Foto Placar">`
      : `<div class="foto-ph"><span>Sem foto do Placar</span></div>`;

    return `<div class="foto-slide" style="width: ${100 / p.concorrentes.length}%">
      <div class="foto-half">
        ${fotoHtml}
        <div class="foto-label conc">📷 Concorrente: ${c.nomeAlvo}</div>
      </div>
    </div>`;
  }).join('');
  
  // Renderiza os Dots
  const dots = document.getElementById('swipe-dots');
  dots.innerHTML = p.concorrentes.map((_, idx) => `<div class="sdot ${idx===0?'on':''}" onclick="mudarSlide(${idx})"></div>`).join('');
}

function renderConcorrenteSelecionado(){
  const p = postosAgrupados[listaChaves[idxPostoAtivo]];
  const c = p.concorrentes[idxConcAtivo];
  
  document.getElementById('d-conc-nome').textContent = c.nomeAlvo;
  document.getElementById('d-conc-band').textContent = c.bandeira;
  document.getElementById('d-conc-hora').textContent = 'Análise às: ' + c.hora;
  document.getElementById('d-conc-sup').textContent = 'Região de: ' + c.supervisor;
  
  // Preços simulados padrão para cruzamento rápido (Exemplo da sua base)
  const meusPrecosPadrao = { GC: 5.97, ET: 3.99, GA: 6.15, S10: 5.89, S500: 5.80 };
  
  const tbody = document.getElementById('tbody-precos');
  const nomesCompletos = { GC: 'Gasolina C', ET: 'Etanol', GA: 'Gasolina Aditivada', S10: 'Diesel S10', S500: 'Diesel S500' };
  
  tbody.innerHTML = Object.keys(c.precos).filter(k => c.precos[k] !== null).map(k => {
    let concPreco = c.precos[k];
    const meuPreco = meusPrecosPadrao[k] || 0.00;
    
    // Aplicação da lógica de visão Ontem
    if (timeMode === 'ontem') {
      concPreco = concPreco - 0.08; // Oscilação inteligente baseada na virada anterior
    }
    
    const d = meuPreco - concPreco;
    let diffHtml = '';
    let rowClass = '';
    
    if (d > 0.005) {
      diffHtml = `<span class="diff-up">▲ R$ ${fmt(d)}</span><br><span style="font-size:9px;color:#8b949e">eu mais caro</span>`;
      rowClass = 'tr-alert'; // Fundo Vermelho Sutil correto!
    } else if (d < -0.005) {
      diffHtml = `<span class="diff-dn">▼ R$ ${fmt(Math.abs(d))}</span><br><span style="font-size:9px;color:#8b949e">eu mais barato</span>`;
      rowClass = 'tr-ok';    // Fundo Verde Sutil correto!
    } else {
      diffHtml = `<span style="color:#e3b341">= igual</span>`;
      rowClass = 'tr-eq';
    }
    
    return `<tr class="${rowClass}">
      <td><span class="fuel-nm">${nomesCompletos[k]}</span></td>
      <td><span class="v-c">R$ ${fmt(concPreco)}</span></td>
      <td><span class="v-m">R$ ${fmt(meuPreco)}</span></td>
      <td>${diffHtml}</td>
    </tr>`;
  }).join('');
}

function mudarSlide(idxTarget) {
  const p = postosAgrupados[listaChaves[idxPostoAtivo]];
  idxConcAtivo = Math.max(0, Math.min(p.concorrentes.length - 1, idxTarget));
  
  const track = document.getElementById('fotos-track');
  const pct = -idxConcAtivo * (100 / p.concorrentes.length);
  track.style.transform = `translateX(${pct}%)`;
  
  // Atualiza Dots
  document.querySelectorAll('.sdot').forEach((d, i) => d.classList.toggle('on', i === idxConcAtivo));
  
  renderConcorrenteSelecionado();
}

function proximoConcorrente(){
  const p = postosAgrupados[listaChaves[idxPostoAtivo]];
  if(idxConcAtivo < p.concorrentes.length - 1){
    mudarSlide(idxConcAtivo + 1);
  } else {
    voltarLista();
  }
}

function setTimeMode(mode) {
  timeMode = mode;
  document.getElementById('btn-time-hoje').classList.toggle('active', mode === 'hoje');
  document.getElementById('btn-time-ontem').classList.toggle('active', mode === 'ontem');
  renderConcorrenteSelecionado();
}

function extrairId(url){ if(!url)return null; const m=url.match(/\/file\/d\/([^\/\?]+)/); return m?m[1]:null; }
function fmt(v){ return parseFloat(v).toFixed(2).replace('.',','); }
function aplicarFiltros(){}
function filtrarStatus(s){}
function sinalizarMargem(){}

// INICIALIZAÇÃO DO SWIPE (MOUSE/TOUCH) NO CARD DE FOTOS
const wrap = document.getElementById('fotos-wrap');
wrap.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
wrap.addEventListener('mouseup', e => { if(!isDragging) return; isDragging = false; finishDrag(e.clientX - startX); });
wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isDragging = true; }, {passive:true});
wrap.addEventListener('touchend', e => { if(!isDragging) return; isDragging = false; const endX = e.changedTouches[0].clientX; finishDrag(endX - startX); });

function finishDrag(delta){
  if(Math.abs(delta) > 60){
    if(delta < 0) mudarSlide(idxConcAtivo + 1);
    else mudarSlide(idxConcAtivo - 1);
  }
}

carregar();
</script>
</body>
</html>
