  body.claro .dd-item:hover { background: #e6f9f2; color: #007a55; }
  body.claro .dd-search input { background: #f0f2f5; border-color: #cdd1da; color: #1a1f2e; }
  body.claro .foto-placeholder { color: #aab0bd; }
  body.claro .pc-gc   { background: #d4f5e2; color: #1a6640; }
  body.claro .pc-et   { background: #ede8fd; color: #4a2d99; }
  body.claro .pc-ga   { background: #ddeeff; color: #1a4080; }
  body.claro .pc-s10  { background: #fef3d0; color: #7a5200; }
  body.claro .pc-s500 { background: #fde8d8; color: #7a3000; }
  /* botão tema */
  .btn-tema { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 5px 11px; font-size: 13px; color: #c9d1d9; cursor: pointer; line-height: 1; }
  .btn-tema:hover { background: #30363d; }
  body.claro .btn-tema { background: #eaecf0; border-color: #cdd1da; color: #1a1f2e; }
  body.claro .btn-tema:hover { background: #dde1e9; }

  /* TOPBAR */
  .topbar { background: #161b22; border-bottom: 1px solid #21262d; padding: 0 20px; display: flex; align-items: stretch; height: 48px; }
  .tb-brand { color: #00e5a0; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; padding-right: 16px; border-right: 1px solid #21262d; margin-right: 12px; }
  .tb-sub { color: #8b949e; font-size: 12px; display: flex; align-items: center; }
  .tb-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #00e5a0; animation: pulse 1.4s ease-in-out infinite; display: inline-block; margin-right: 5px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .chip { background: #21262d; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #8b949e; }

  .btn-reload { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 5px 12px; font-size: 12px; color: #c9d1d9; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .btn-reload:hover { background: #30363d; }

  /* PROGRESSO */
  .prog-bar-wrap { height: 3px; background: #21262d; }
  .prog-bar-fill { height: 100%; background: #00e5a0; transition: width .3s; }

  /* FILTROS */
  .filtros { background: #161b22; border-bottom: 1px solid #21262d; padding: 8px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filtros select, .filtros input[type=date] { background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 11px; padding: 4px 8px; cursor: pointer; }
  .filtros label { font-size: 11px; color: #8b949e; }
  .pill-filter { background: #21262d; border: 1px solid #30363d; border-radius: 20px; padding: 3px 12px; font-size: 11px; color: #8b949e; cursor: pointer; user-select: none; }
  .pill-filter.active { background: #00e5a015; border-color: #00e5a050; color: #00e5a0; }
  .pill-filter.alert-pill.active { background: #f8514915; border-color: #f8514950; color: #f85149; }
  .count { margin-left: auto; font-size: 11px; color: #8b949e; }
  .count b { color: #e6edf3; }

  /* LAYOUT PRINCIPAL */
  .main { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 95px); }

  /* LISTA LATERAL */
  .lista { border-right: 1px solid #21262d; overflow-y: auto; background: #0d1117; }

  .li-prices { display: flex; gap: 4px; flex-wrap: wrap; }
  .pc { border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 600; }
  .pc-gc { background: #0f2a0f; color: #4ade80; }
  .pc-et { background: #1a0f2a; color: #c084fc; }
  .pc-ga { background: #0f1a2a; color: #60a5fa; }
  .pc-s10 { background: #2a1f0a; color: #fbbf24; }
  .pc-s500 { background: #2a150a; color: #fb923c; }
  .band-pill { border-radius: 3px; padding: 1px 5px; font-size: 9px; font-weight: 600; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sd-pend { background: #484f58; }
  .sd-ok { background: #00e5a0; }
  .sd-flag { background: #f85149; }

  /* PAINEL DIREITO */
  .painel { display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER DO CARD */
  .card-header { background: #161b22; border-bottom: 1px solid #21262d; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .card-sub { font-size: 12px; color: #8b949e; margin-top: 3px; }
  .meta-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-chip { background: #21262d; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #8b949e; display: flex; align-items: center; gap: 5px; }
  .meta-chip b { color: #c9d1d9; }

  /* CORPO DO CARD */
  .card-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }

  .foto-col { border-right: 1px solid #21262d; display: flex; flex-direction: column; overflow: hidden; }
  .foto-label { padding: 10px 16px; font-size: 10px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: #484f58; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; }

  .foto-img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; cursor: zoom-in; }

  .foto-footer { padding: 8px 16px; border-top: 1px solid #21262d; display: flex; gap: 12px; align-items: center; background: #0d1117; }
  .foto-meta { font-size: 10px; color: #8b949e; display: flex; align-items: center; gap: 4px; }
  .btn-drive { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 3px 10px; font-size: 11px; color: #c9d1d9; cursor: pointer; text-decoration: none; margin-left: auto; }
  .btn-drive:hover { background: #30363d; }

  /* PREÇOS */
  .precos-col { display: flex; flex-direction: column; overflow-y: auto; }
  .precos-label { padding: 10px 16px; font-size: 10px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: #484f58; border-bottom: 1px solid #21262d; position: sticky; top: 0; background: #161b22; z-index: 1; }
  .precos-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  /* SELETOR DE POSTO (clicável no nome) */
  .posto-selector { position: relative; display: inline-block; }
  .posto-nome-clicavel { color: #00e5a0; font-weight: 600; font-size: 15px; cursor: pointer; border-bottom: 1px dashed #00e5a050; padding-bottom: 1px; user-select: none; }
  .posto-nome-clicavel:hover { color: #00ffb3; border-bottom-color: #00e5a0; }
  .dropdown-lista { position: absolute; top: calc(100% + 6px); left: 0; background: #161b22; border: 1px solid #30363d; border-radius: 8px; min-width: 220px; z-index: 100; box-shadow: 0 8px 24px #00000060; max-height: 280px; overflow-y: auto; }
  .dropdown-lista.oculto { display: none; }
  .dd-item { padding: 9px 14px; font-size: 12px; color: #c9d1d9; cursor: pointer; border-bottom: 1px solid #21262d; }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover { background: #0d2a1e; color: #00e5a0; }
  .dd-item.selecionado { color: #00e5a0; background: #0d2a1e; font-weight: 600; }

  /* TABELA DE COMPARAÇÃO */
  .comp-table { width: 100%; border-collapse: collapse; }
  .comp-table th { font-size: 9px; color: #484f58; text-transform: uppercase; letter-spacing: .5px; padding: 5px 8px; text-align: left; border-bottom: 1px solid #21262d; }

  .tr-ok td { background: #0b1810; }
  .tr-eq td { background: #1a150a; }
  .fuel-nm { font-size: 11px; color: #8b949e; }
  .v-conc { font-size: 14px; font-weight: 600; color: #e6edf3; }
  .v-meu { font-size: 14px; font-weight: 600; color: #e6edf3; }
  .diff-up { color: #00e5a0; font-weight: 600; font-size: 13px; }

  .custo-txt { font-size: 10px; color: #8b949e; }
  .mg-ok { font-size: 10px; color: #00e5a0; }
  .mg-warn { font-size: 10px; color: #f85149; font-weight: 600; }

  /* ALERTA MARGEM */
  .alerta-margem { background: #1a0800; border: 1px solid #f8514940; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }

  .custo-bloco { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 10px 12px; }

  .custo-row:last-child { border-bottom: none; }
  .custo-nm { font-size: 11px; color: #8b949e; }
  .custo-vals { display: flex; gap: 14px; align-items: center; }

  /* AÇÕES */
  .acoes { padding: 12px 16px; border-top: 1px solid #21262d; display: flex; gap: 8px; background: #0d1117; }
  .btn-acao { border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity .15s; }
  .btn-acao:hover { opacity: .85; }
  .btn-prev { background: #21262d; color: #c9d1d9; flex: 1; }
  .btn-flag { background: #1a0800; color: #f85149; border: 1px solid #f8514940; padding: 10px 14px; }
  .btn-confirm { background: #00e5a0; color: #0d1117; flex: 2; }

  /* ESTADO VAZIO / LOADING */
  .estado-central { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: #484f58; font-size: 13px; }
  .spinner { width: 32px; height: 32px; border: 2px solid #21262d; border-top-color: #00e5a0; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* BADGE STATUS */
  .badge { border-radius: 4px; padding: 2px 8px; font-size: 10px; font-weight: 600; }
  .badge-pend { background: #21262d; color: #8b949e; }
  .badge-ok { background: #00e5a015; color: #00e5a0; border: 1px solid #00e5a030; }
  .badge-flag { background: #f8514915; color: #f85149; border: 1px solid #f8514940; }

  /* MODAL ZOOM FOTO */
  .modal-zoom { position: fixed; inset: 0; background: #000000cc; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
  .modal-zoom.oculto { display: none; }
  .modal-zoom img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  /* NOMES POSTOS NO DROPDOWN */
  .dd-search { padding: 8px 10px; border-bottom: 1px solid #21262d; }
  .dd-search input { width: 100%; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 12px; padding: 5px 8px; }
  .dd-search input:focus { outline: none; border-color: #00e5a060; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand">⛽ JBRETAS</div>
  <div class="tb-sub">// Revisor de Coletas</div>
  <div class="tb-right">
    <span id="live-badge" class="chip"><span class="live-dot"></span>ao vivo</span>
    <span class="chip">Data: <b id="data-hoje">—</b></span>
    <span class="chip"><b id="qtd-total">—</b> coletas</span>
    <button class="btn-reload" onclick="carregarDados()">↻ Atualizar</button>
    <button class="btn-reload" onclick="diagnostico()" title="Ver o que o endpoint está retornando">🔍 Diagnóstico</button>
    <button class="btn-tema" id="btn-tema" onclick="alternarTema()" title="Alternar tema claro/escuro">☀</button>
  </div>
</div>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>

<!-- FILTROS -->
<div class="filtros">
  <label>Data:</label>
  <input type="date" id="filtro-data" onchange="aplicarFiltros()">
  <label>Supervisor:</label>
  <select id="filtro-supervisor" onchange="aplicarFiltros()">
    <option value="">Todos</option>
  </select>
  <label>Posto:</label>
  <select id="filtro-posto" onchange="aplicarFiltros()">
    <option value="">Todos</option>
  </select>
  <span class="pill-filter active" id="pill-todos" onclick="setPill('todos')">Todos</span>
  <span class="pill-filter" id="pill-pend" onclick="setPill('pend')">⏳ Pendentes</span>
  <span class="pill-filter" id="pill-ok" onclick="setPill('ok')">✓ Confirmados</span>
  <span class="pill-filter alert-pill" id="pill-flag" onclick="setPill('flag')">⚠ Margem</span>
  <span class="count"><b id="qtd-filtrados">0</b> registros</span>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LISTA -->
  <div class="lista" id="lista-col">
    <div class="estado-central"><div class="spinner"></div>Carregando coletas...</div>
  </div>

  <!-- PAINEL -->
  <div class="painel" id="painel-col">
    <div class="estado-central">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#484f58" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
      Selecione uma coleta para revisar
    </div>
  </div>

</div>

<!-- MODAL ZOOM -->
<div class="modal-zoom oculto" id="modal-zoom" onclick="this.classList.add('oculto')">
  <img id="modal-img" src="">
</div>

<script>
// ─── CONFIGURAÇÃO ───────────────────────────────────────────────────────────
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbwoJ3-g48frwYtMlnpVj5EIYapInPP11OJXrkOPUzCULrbIZWMQW51xFe-Ot4cox00r/exec';
const PARAM_COLETA = 'tipo=coletaRecentes&dias=1'; // retorna coletas do dia de hoje

// JSONP — contorna CORS quando rodando como arquivo local (file://)
function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'jb_cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 12000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data) { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('JSONP error')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

async function carregarDados() {
  document.getElementById('lista-col').innerHTML = '<div class="estado-central"><div class="spinner"></div>Carregando...</div>';
  document.getElementById('painel-col').innerHTML = '<div class="estado-central"><div class="spinner"></div></div>';
  try {
    const url = ENDPOINT + '?' + PARAM_COLETA;
    // Tenta fetch normal primeiro (quando hospedado em servidor)
    // Se falhar por CORS (file://), usa JSONP automaticamente
    let json;
    try {
      const resp = await fetch(url);
      json = await resp.json();
    } catch(corsErr) {
      console.info('fetch bloqueado (CORS), tentando JSONP...');
      json = await fetchJSONP(url);
    }

    // Suporte a diferentes formatos de retorno
    let registros = [];
    if (Array.isArray(json)) registros = json;
    else if (json.registros && Array.isArray(json.registros)) registros = json.registros; // coletaRecentes
    else if (json.data && Array.isArray(json.data)) registros = json.data;
    else if (json.coletas && Array.isArray(json.coletas)) registros = json.coletas;

    todosRegistros = registros.map((r, i) => ({ ...normalizar(r), _id: i }));
    estados = {};
    todosRegistros.forEach(r => { estados[r._id] = 'pend'; });

function converterData(d) {
  if (!d) return '';
  // tenta formatos dd/mm/yyyy e yyyy-mm-dd
  if (d.includes('/')) {
    const [dia, mes, ano] = d.split('/');
    return `${ano}-${mes.padStart(2,'0')}-${dia.padStart(2,'0')}`;
  }
  return d;
}

function normalizar(r) {
  const n = {};
  for (const k in r) { n[k.trim()] = r[k]; }
  return {
    Data:       n.data       || n.Data       || '',
    Hora:       n.hora       || n.Hora       || '',
    Posto:      n.posto      || n.Posto      || n['Posto (Gerente)'] || '',
    Gerente:    n.gerente    || n.Gerente    || '',
    PostoAlvo:  n.postoAlvo  || n.PostoAlvo  || n['Posto Alvo'] || n['POSTO ALVO'] || n.Alvo || '',
    Tipo:       n.tipo       || n.Tipo       || '',
    Bandeira:   n.bandeira   || n.Bandeira   || '',
    Rede:       n.rede       || n.Rede       || '',
    Supervisor: n.supervisor || n.Supervisor || '',
    ET:         parseFuel(n.ET  || n.et),
    GC:         parseFuel(n.GC  || n.gc),
    GA:         parseFuel(n.GA  || n.ga),
    S10:        parseFuel(n.S10 || n.s10),
    S500:       parseFuel(n.S500|| n.s500),
    Latitude:   n.lat        || n.Latitude   || n.latitude  || '',
    Longitude:  n.lng        || n.Longitude  || n.longitude || '',
    Foto:       n.foto       || n.Foto       || n.foto_url  || n.FotoURL || '',
  };
}

function parseFuel(v) {
  if (v === null || v === undefined || v === '' || v === '-') return null;
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? null : n;
}

// ─── FILTROS ────────────────────────────────────────────────────────────────
function aplicarFiltros() {
  const dataVal = document.getElementById('filtro-data').value; // yyyy-mm-dd
  const supVal  = document.getElementById('filtro-supervisor').value;
  const postoVal = document.getElementById('filtro-posto').value;

  registrosFiltrados = todosRegistros.filter(r => {
    if (dataVal) {
      const dc = converterData(r.Data);
      if (dc !== dataVal) return false;
    }
    if (supVal && r.Supervisor !== supVal) return false;
    if (postoVal && r.Posto !== postoVal) return false;
    if (filtroStatus === 'pend' && estados[r._id] !== 'pend') return false;
    if (filtroStatus === 'ok'   && estados[r._id] !== 'ok')   return false;
    if (filtroStatus === 'flag' && estados[r._id] !== 'flag') return false;
    return true;
  });

  document.getElementById('qtd-filtrados').textContent = registrosFiltrados.length;
  renderLista();
  if (idxAtivo >= 0) {
    const ainda = registrosFiltrados.findIndex(r => r._id === (registrosFiltrados[idxAtivo]?._id));
    if (ainda < 0) limparPainel();
  }
}

function setPill(tipo) {
  filtroStatus = tipo;

}

function limparPainel() {

function renderPainel() {
  if (idxAtivo < 0 || idxAtivo >= registrosFiltrados.length) return;

function _renderPainelInterno(r) {
  const custo = CUSTO_POSTOS[r.Posto] || CUSTO_POSTOS['DEFAULT'];
  const bc = corBandeira(r.Bandeira);
  const est = estados[r._id] || 'pend';

  // ── Buscar registro do próprio posto PRIMEIRO ────────────────────────────
  // (precisa estar antes da tabela para preencher "Meu Preço")
  const postoNorm = (s) => (s||'').trim().toUpperCase()
    .replace(/^P\.\s*/,'').replace(/\s+/g,' ');

  const registroProprio = todosRegistros.find(x =>
    (x.Tipo === 'Próprio' || x.Tipo === 'Proprio') &&
    x.Data === r.Data &&
    (postoNorm(x.PostoAlvo) === postoNorm(r.Posto) ||
     postoNorm(x.Posto)     === postoNorm(r.Posto))
  );

  // "Meu Preço": primeiro tenta do objeto MEU_PRECO, depois pega do registro Próprio
  const meu = Object.assign({}, MEU_PRECO[r.Posto] || {});
  if (registroProprio) {
    ['GC','ET','GA','S10','S500'].forEach(k => {
      if (registroProprio[k] !== null && registroProprio[k] !== undefined && !meu[k]) {
        meu[k] = registroProprio[k];
      }
    });
  }

  // Detectar alerta de margem
  let alertaMargem = null;
  ['GC','ET','GA','S10','S500'].forEach(k => {
    if (r[k] === null || r[k] === undefined) return;
    const c = custo[k];
    const min = MARGEM_MINIMA[k] || 0.20;
    if (c && r[k] < c + min) {
      if (!alertaMargem) alertaMargem = [];
      alertaMargem.push({ k, concorrente: r[k], custo: c, minPossivel: (c + min).toFixed(2).replace('.',',') });
    }
  });

  // Tabela de combustíveis
  const nomes = {GC:'Gasolina C', ET:'Etanol', GA:'Gas. Aditivada', S10:'Diesel S10', S500:'Diesel S500'};
  const linhasComb = ['GC','ET','GA','S10','S500'].filter(k => r[k] !== null && r[k] !== undefined).map(k => {
    const c = custo[k];
    const mp = meu[k] || null;
    const conc = r[k];
    let diffHtml = '<span class="diff-eq">—</span>';
    let trCls = '';
    if (mp !== null) {
      const d = mp - conc;
      if (d > 0.005)       { diffHtml = `<span class="diff-up">▲ ${fmt(d)}</span><br><span style="font-size:9px;color:#8b949e">eu mais barato</span>`; trCls = 'tr-ok'; }
      else if (d < -0.005) { diffHtml = `<span class="diff-dn">▼ ${fmt(Math.abs(d))}</span><br><span style="font-size:9px;color:#8b949e">ele mais barato</span>`; trCls = 'tr-alert'; }
      else                  { diffHtml = `<span class="diff-eq">= igual</span>`; trCls = 'tr-eq'; }
    }
    const mgHtml = c ? (() => {
      const mg = conc - c;
      const cls = mg >= (MARGEM_MINIMA[k]||0.20) ? 'mg-ok' : 'mg-warn';
      return `<span class="${cls}">${mg>=0?'+':''}${fmt(mg)}/L</span>`;
    })() : '—';
    return `<tr class="${trCls}">
      <td><span class="fuel-nm">${nomes[k]}</span></td>
      <td><span class="v-conc">R$${fmt(conc)}</span></td>
      <td><span class="v-meu">${mp !== null ? 'R$'+fmt(mp) : '<span style="color:#484f58">—</span>'}</span></td>
      <td><span class="custo-txt">${c ? 'R$'+fmt(c) : '—'}</span></td>
      <td>${mgHtml}</td>
      <td>${diffHtml}</td>
    </tr>`;
  }).join('');

  // Bloco custo
  const linhaCusto = ['GC','ET','GA','S10','S500'].filter(k => custo[k]).map(k => {
    const mg = r[k] !== null ? (r[k] - custo[k]) : null;
    const min = MARGEM_MINIMA[k] || 0.20;
    const mgHtml = mg !== null ? `<span class="${mg>=min?'mg-ok':'mg-warn'}">${mg>=0?'+':''}${fmt(mg)}/L ${mg<min?'⚠':''}</span>` : '';
    return `<div class="custo-row">
      <span class="custo-nm">${nomes[k]||k}</span>
      <div class="custo-vals">
        <span class="custo-txt">custo R$${fmt(custo[k])}</span>
        ${mgHtml}
      </div>
    </div>`;
  }).join('');

  // Alerta margem
  const alertaHtml = alertaMargem ? `
    <div class="alerta-margem">
      <span class="alerta-margem-icon">⚠</span>
      <div class="alerta-margem-txt">
        ${alertaMargem.map(a => `<b>${nomes[a.k]||a.k}:</b> concorrente R$${fmt(a.concorrente)} — abaixo do piso mínimo de R$${a.minPossivel} (custo + margem mín.)`).join('<br>')}
      </div>
    </div>` : '';

  const fotoConc = converterUrlDrive(r.Foto);
  const fotoIdConc = extrairIdDrive(r.Foto);
  const urlDriveConc = fotoIdConc ? `https://drive.google.com/file/d/${fotoIdConc}/view` : r.Foto;

  const fotoProprio = registroProprio ? converterUrlDrive(registroProprio.Foto) : null;
  const fotoIdProprio = registroProprio ? extrairIdDrive(registroProprio.Foto) : null;
  const urlDriveProprio = fotoIdProprio
    ? `https://drive.google.com/file/d/${fotoIdProprio}/view`
    : (registroProprio?.Foto || '');

  // ── Foto concorrente ─────────────────────────────────────────────────────
  const fotoHtmlConc = fotoConc

         <span style="font-size:11px">Drive bloqueou a exibição inline</span>
         <a href="${urlDriveConc}" target="_blank" style="color:#00e5a0;font-size:12px;text-decoration:none">↗ Abrir foto no Drive</a>

         <span>Foto não disponível</span>

  // ── Foto meu posto ───────────────────────────────────────────────────────
  const fotoHtmlProprio = fotoProprio
    ? `<img class="foto-img" src="${fotoProprio}"

         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
         alt="Foto meu posto">
       <div class="foto-placeholder" style="display:none;flex-direction:column;gap:8px;background:#0b1810">
         <span style="font-size:11px;color:#00e5a090">Drive bloqueou exibição inline</span>
         <a href="${urlDriveProprio}" target="_blank" style="color:#00e5a0;font-size:12px;text-decoration:none">↗ Abrir foto no Drive</a>
       </div>`
    : `<div class="foto-placeholder" style="min-height:90px;background:#0b1810">
         <svg viewBox="0 0 24 24" fill="none" stroke="#00e5a040" stroke-width="1.2" style="width:28px;height:28px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>

  const badgeCls = est==='ok'?'badge-ok':est==='flag'?'badge-flag':'badge-pend';
  const badgeTxt = est==='ok'?'✓ confirmado':est==='flag'?'⚠ margem baixa':'pendente';

  // Seletor de posto clicável
  const postoHtml = `<div class="posto-selector">
    <span class="posto-nome-clicavel" onclick="toggleDropdown(event)" id="posto-display">${r.Posto || '—'}</span>
    <div class="dropdown-lista oculto" id="dd-postos">
      <div class="dd-search"><input type="text" placeholder="Buscar posto..." oninput="filtrarDropdown(this.value)" id="dd-input"></div>
      ${listaPosios.map(p => `<div class="dd-item ${p===r.Posto?'selecionado':''}" onclick="selecionarPosto('${p}')">${p}</div>`).join('')}
    </div>
  </div>`;

  document.getElementById('painel-col').innerHTML = `
    <div class="card-header">
      <div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="card-title">${r.PostoAlvo || '—'}</div>
          <span class="band-pill" style="background:${bc.bg};color:${bc.txt};font-size:11px;padding:3px 8px">${r.Bandeira||''}</span>
          <span class="badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="card-sub">Meu posto: ${postoHtml}</div>
      </div>
      <div class="meta-chips">
        <div class="meta-chip">👤 <b>${r.Gerente||'—'}</b></div>
        <div class="meta-chip">🕐 <b>${r.Hora||'—'}</b></div>
        <div class="meta-chip">📋 <b>${r.Supervisor||'—'}</b></div>
        <div class="meta-chip">Coleta <b>${idxAtivo+1}/${registrosFiltrados.length}</b></div>
      </div>

    <div class="card-body">
      <div class="foto-col">
        <div class="foto-label">

        </div>
        <div class="foto-wrap" style="flex:1.4">${fotoHtmlConc}</div>

        <div class="foto-label" style="border-top:1px solid #21262d;color:#00e5a0">
          🏠 Meu posto — ${r.Posto || ''}
          ${fotoProprio ? `<a class="btn-drive" href="${registroProprio?.Foto || ''}" target="_blank">↗ Drive</a>` : ''}

        <div class="foto-wrap" style="flex:1;min-height:80px">${fotoHtmlProprio}</div>

        <div class="foto-footer">

        </div>

      <div class="precos-col">
        <div class="precos-label">Comparação de preços</div>
        <div class="precos-body">
          ${alertaHtml}
          <table class="comp-table">
            <thead>
              <tr>
                <th>Combustível</th>
                <th>Concorrente</th>
                <th>Meu preço</th>
                <th>Meu custo</th>
                <th>Margem</th>
                <th>Diferença</th>
              </tr>
            </thead>
            <tbody>${linhasComb}</tbody>
          </table>
          <div>
            <div style="font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:#484f58;margin-bottom:6px">Custo de aquisição hoje</div>

  // fecha dropdown ao clicar fora
  document.addEventListener('click', fecharDropdownFora, {once:false});
} // fim _renderPainelInterno

function atualizarProg() {
  const total = registrosFiltrados.length;
  const confirmados = registrosFiltrados.filter(r => estados[r._id] !== 'pend').length;
  const pct = total > 0 ? (confirmados/total*100).toFixed(0) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
}

// ─── AÇÕES ────────────────────────────────────────────────────────────────
function confirmar() {
  if (idxAtivo < 0) return;
  estados[registrosFiltrados[idxAtivo]._id] = 'ok';
  atualizarProg();
  if (idxAtivo < registrosFiltrados.length - 1) { idxAtivo++; }
  renderLista();
  renderPainel();
}

function navAnterior() {
  if (idxAtivo > 0) { idxAtivo--; renderLista(); renderPainel(); }
}

function sinalizarMargem() {
  if (idxAtivo < 0) return;
  estados[registrosFiltrados[idxAtivo]._id] = 'flag';
  atualizarProg();
  renderLista();
  renderPainel();
}

// ─── SELETOR DE POSTO ────────────────────────────────────────────────────
function toggleDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('dd-postos');
  if (!dd) return;
  dd.classList.toggle('oculto');
  if (!dd.classList.contains('oculto')) {
    document.getElementById('dd-input')?.focus();
  }
}

function fecharDropdownFora(e) {
  const dd = document.getElementById('dd-postos');
  if (dd && !dd.contains(e.target) && e.target.id !== 'posto-display') {
    dd.classList.add('oculto');
  }
}

function filtrarDropdown(q) {
  const items = document.querySelectorAll('.dd-item');
  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function selecionarPosto(nome) {
  if (idxAtivo < 0) return;
  // Muda o posto do registro atual para comparar com outro posto
  registrosFiltrados[idxAtivo].Posto = nome;
  document.getElementById('dd-postos')?.classList.add('oculto');
  renderPainel();
}

// ─── ZOOM FOTO ────────────────────────────────────────────────────────────
function zoomFoto(src) {
  // Garante que a URL está no formato de visualização correta
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-zoom').classList.remove('oculto');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined) return '—';
  return parseFloat(v).toFixed(2).replace('.', ',');
}

function corBandeira(b) {
  if (!b) return {bg:'#21262d', txt:'#8b949e'};
  const bl = b.toLowerCase();
  if (bl.includes('shell'))    return {bg:'#92600020', txt:'#fcd34d'};
  if (bl.includes('ipiranga')) return {bg:'#d6400020', txt:'#f87171'};
  if (bl.includes('br') || bl.includes('petrobras')) return {bg:'#00562020', txt:'#4ade80'};
  if (bl.includes('ale'))      return {bg:'#1e3a8a20', txt:'#93c5fd'};
  if (bl.includes('raizen') || bl.includes('raízen')) return {bg:'#92400e20', txt:'#fbbf24'};
  if (bl.includes('phoenix'))  return {bg:'#4c1d9520', txt:'#c4b5fd'};
  return {bg:'#30363d', txt:'#c9d1d9'};
}

// ─── DIAGNÓSTICO ─────────────────────────────────────────────────────────────
async function diagnostico() {
  const url = ENDPOINT + '?' + PARAM_COLETA;
  const painel = document.getElementById('painel-col');
  painel.innerHTML = `<div class="estado-central"><div class="spinner"></div>Testando conexão com Apps Script...</div>`;

  const resultados = [];

  // Teste 1: fetch direto
  try {
    const r = await Promise.race([
      fetch(url).then(r => r.text()),
      new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000))
    ]);
    resultados.push({ ok: true, metodo: 'fetch', resp: r.substring(0, 300) });
  } catch(e) {
    resultados.push({ ok: false, metodo: 'fetch', erro: e.message });
  }

  // Teste 2: JSONP
  try {
    const json = await Promise.race([
      fetchJSONP(url),
      new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000))
    ]);
    resultados.push({ ok: true, metodo: 'JSONP', resp: JSON.stringify(json).substring(0, 300) });
  } catch(e) {
    resultados.push({ ok: false, metodo: 'JSONP', erro: e.message });
  }

  const html = resultados.map(r => `
    <div style="background:${r.ok?'#0b1810':'#1a0f0f'};border:1px solid ${r.ok?'#00e5a030':'#f8514940'};border-radius:8px;padding:12px;margin-bottom:8px">
      <div style="font-weight:600;color:${r.ok?'#00e5a0':'#f85149'};margin-bottom:6px">${r.ok?'✓':'✗'} ${r.metodo}</div>
      ${r.ok
        ? `<pre style="font-size:10px;color:#8b949e;white-space:pre-wrap;word-break:break-all">${r.resp}</pre>`
        : `<div style="font-size:12px;color:#f87171">${r.erro}</div>`}
    </div>`).join('');

  painel.innerHTML = `
    <div style="padding:20px;overflow-y:auto;height:100%">
      <div style="font-size:14px;font-weight:600;color:#e6edf3;margin-bottom:16px">🔍 Diagnóstico de conexão</div>
      <div style="font-size:11px;color:#8b949e;margin-bottom:12px">URL: <span style="color:#c9d1d9">${url}</span></div>
      ${html}
      <div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px;margin-top:8px">
        <div style="font-size:12px;font-weight:600;color:#e3b341;margin-bottom:8px">⚡ Se JSONP falhou, adicione isso ao seu doGet no Code.gs:</div>
        <pre style="font-size:11px;color:#8b949e;background:#0d1117;padding:10px;border-radius:6px;white-space:pre-wrap">function doGet(e) {
  const callback = e.parameter.callback;
  // ... seu código atual ...
  const json = JSON.stringify(resultado);
  
  // JSONP — necessário para arquivo local
  if (callback) {
    return ContentService
      .createTextOutput(callback + '(' + json + ')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ContentService
    .createTextOutput(json)
    .setMimeType(ContentService.MimeType.JSON);
}</pre>
      </div>
      <button class="btn-reload" style="margin-top:12px" onclick="renderLista();limparPainel()">← Voltar</button>
    </div>`;
}
// ─── HELPERS DRIVE ────────────────────────────────────────────────────────
function converterUrlDrive(url) {
  if (!url) return null;
  const m1 = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m1) return `https://drive.google.com/thumbnail?id=${m1[1]}&sz=w800`;
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w800`;
  if (url.includes('thumbnail?id=')) return url;
  if (url.includes('uc?export=view')) {
    const m3 = url.match(/id=([^&]+)/);
    if (m3) return `https://drive.google.com/thumbnail?id=${m3[1]}&sz=w800`;
  }
  return url;
}

function extrairIdDrive(url) {
  if (!url) return null;
  const m1 = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m1) return m1[1];
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return m2[1];
  return null;
}

// ─── TEMA CLARO / ESCURO ──────────────────────────────────────────────────
function alternarTema() {
  const claro = document.body.classList.toggle('claro');
  document.getElementById('btn-tema').textContent = claro ? '🌙' : '☀';
  localStorage.setItem('jb_tema', claro ? 'claro' : 'escuro');
}
// Restaura tema salvo
(function() {
  if (localStorage.getItem('jb_tema') === 'claro') {
    document.body.classList.add('claro');
    const btn = document.getElementById('btn-tema');
    if (btn) btn.textContent = '🌙';
  }
})();

carregarDados();
</script>
